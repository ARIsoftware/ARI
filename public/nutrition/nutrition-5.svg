<svg width="700" height="850" viewBox="0 0 700 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="700" height="850" fill="url(#bg5)"/>
  
  <!-- Title -->
  <text x="350" y="100" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="white">
    HYDRATION
  </text>
  <text x="350" y="180" font-family="Arial, sans-serif" font-size="32" font-weight="600" text-anchor="middle" fill="white">
    BEGIN YOUR RACE WELL HYDRATED
  </text>
  
  <!-- Timeline -->
  <g transform="translate(100, 250)">
    <!-- 48 Hours Out -->
    <rect x="0" y="0" width="150" height="50" fill="#d4af37" rx="25"/>
    <text x="75" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#1a1a1a">
      48 Hours Out
    </text>
    
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="white">
      Ensure Hydration
    </text>
    <rect x="0" y="100" width="200" height="40" fill="#d4af37" rx="20"/>
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#1a1a1a">
      2-3 L/day
    </text>
    <text x="0" y="165" font-family="Arial, sans-serif" font-size="14" fill="white">
      Add extra salt
    </text>
    <text x="0" y="190" font-family="Arial, sans-serif" font-size="14" fill="white">
      Use electrolytes
    </text>
  </g>
  
  <!-- 2-4 Hours Out -->
  <g transform="translate(100, 450)">
    <rect x="0" y="0" width="150" height="50" fill="#d4af37" rx="25"/>
    <text x="75" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#1a1a1a">
      2-4 Hours Out
    </text>
    
    <rect x="0" y="70" width="120" height="40" fill="#d4af37" rx="20"/>
    <text x="60" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#1a1a1a">
      5-7 mL/kg
    </text>
    <text x="0" y="135" font-family="Arial, sans-serif" font-size="14" fill="white">
      Top off sips
    </text>
    <text x="0" y="160" font-family="Arial, sans-serif" font-size="14" fill="white">
      Spread intake over time
    </text>
  </g>
  
  <!-- Race Time -->
  <g transform="translate(100, 620)">
    <rect x="0" y="0" width="150" height="50" fill="#d4af37" rx="25"/>
    <text x="75" y="32" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#1a1a1a">
      HYROX Race
    </text>
    
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="14" fill="white">
      200-250 mL 10-15 minutes to start
    </text>
    <text x="0" y="125" font-family="Arial, sans-serif" font-size="14" fill="white">
      Take water as needed
    </text>
    <text x="0" y="150" font-family="Arial, sans-serif" font-size="14" fill="white">
      Chew gum to keep mouth moist
    </text>
  </g>
  
  <!-- Urine Color Chart -->
  <g transform="translate(450, 300)">
    <text x="75" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="white">
      Urine Color Guide
    </text>
    <rect x="0" y="20" width="150" height="30" fill="#FFFFE0"/>
    <rect x="0" y="50" width="150" height="30" fill="#FFFF99"/>
    <rect x="0" y="80" width="150" height="30" fill="#FFFF66"/>
    <rect x="0" y="110" width="150" height="30" fill="#FFCC33"/>
    <rect x="0" y="140" width="150" height="30" fill="#FF9933"/>
    <rect x="0" y="170" width="150" height="30" fill="#FF6633"/>
    <rect x="0" y="200" width="150" height="30" fill="#CC6633"/>
    <rect x="0" y="230" width="150" height="30" fill="#996633"/>
    
    <text x="160" y="40" font-family="Arial, sans-serif" font-size="12" fill="white">Well hydrated</text>
    <text x="160" y="130" font-family="Arial, sans-serif" font-size="12" fill="white">Normal</text>
    <text x="160" y="220" font-family="Arial, sans-serif" font-size="12" fill="white">Dehydrated</text>
  </g>
  
  <!-- Tips -->
  <text x="100" y="750" font-family="Arial, sans-serif" font-size="14" fill="white">
    💡 Moderate dose of caffeine 60 min before start can improve performance
  </text>
  
  <!-- Bottom dots -->
  <circle cx="320" cy="800" r="6" fill="#666"/>
  <circle cx="340" cy="800" r="6" fill="#666"/>
  <circle cx="360" cy="800" r="6" fill="#666"/>
  <circle cx="380" cy="800" r="6" fill="#666"/>
  <circle cx="400" cy="800" r="6" fill="white"/>
</svg>