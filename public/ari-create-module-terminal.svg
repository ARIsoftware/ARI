<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ARI terminal: /ari-create-module being typed">
  <style><![CDATA[
    .mono {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      font-weight: 600;
      dominant-baseline: alphabetic;
      text-rendering: geometricPrecision;
    }
    .title {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 600;
      fill: rgba(255,255,255,0.55);
    }
    .bodyText { fill: rgba(255,255,255,0.90); }
    .amber { fill: #fbbf24; }
    .cursor { fill: rgba(255,255,255,0.90); }

    @media (prefers-reduced-motion: reduce) {
      .typed-char { opacity: 1 !important; }
      #typingCursor { opacity: 1 !important; x: 187.3px; }
    }
  ]]></style>

  <rect x="0.5" y="0.5" width="479" height="219" rx="16" ry="16" fill="#212121" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <g>
    <circle cx="24" cy="28" r="6" fill="rgba(255,255,255,0.22)"/>
    <circle cx="42" cy="28" r="6" fill="rgba(255,255,255,0.22)"/>
    <circle cx="60" cy="28" r="6" fill="rgba(255,255,255,0.22)"/>
    <text x="92" y="32" class="title">ari ~ welcome</text>
    <line x1="0" y1="56" x2="480" y2="56" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </g>

  <!-- Vertically centered command line -->
  <g class="mono">
    <text x="24" y="133" class="amber">$</text>

