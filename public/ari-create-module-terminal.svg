        keyTimes="0.0;0.0556;0.1111;0.1667;0.2222;0.2778;0.3333;0.3889;0.4444;0.5;0.5556;0.6111;0.6667;0.7222;0.7778;0.8333;0.8889;0.9444;1.0"
        dur="1.44s" begin="0.35s" calcMode="discrete" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.75;0.80;0.95;1" dur="1.1s" begin="1.79s" repeatCount="indefinite"/>
