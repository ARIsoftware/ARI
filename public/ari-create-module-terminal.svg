      <text class="typed-char" x="61.7" y="133" opacity="0">r<animate attributeName="opacity" from="0" to="1" begin="0.51s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="69.5" y="133" opacity="0">i<animate attributeName="opacity" from="0" to="1" begin="0.59s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="77.4" y="133" opacity="0">-<animate attributeName="opacity" from="0" to="1" begin="0.67s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="85.2" y="133" opacity="0">c<animate attributeName="opacity" from="0" to="1" begin="0.75s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="93.1" y="133" opacity="0">r<animate attributeName="opacity" from="0" to="1" begin="0.83s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="101.0" y="133" opacity="0">e<animate attributeName="opacity" from="0" to="1" begin="0.91s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="108.8" y="133" opacity="0">a<animate attributeName="opacity" from="0" to="1" begin="0.99s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="116.7" y="133" opacity="0">t<animate attributeName="opacity" from="0" to="1" begin="1.07s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="124.5" y="133" opacity="0">e<animate attributeName="opacity" from="0" to="1" begin="1.15s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="132.4" y="133" opacity="0">-<animate attributeName="opacity" from="0" to="1" begin="1.23s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="140.2" y="133" opacity="0">m<animate attributeName="opacity" from="0" to="1" begin="1.31s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="148.1" y="133" opacity="0">o<animate attributeName="opacity" from="0" to="1" begin="1.39s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="155.9" y="133" opacity="0">d<animate attributeName="opacity" from="0" to="1" begin="1.47s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="163.8" y="133" opacity="0">u<animate attributeName="opacity" from="0" to="1" begin="1.55s" dur="0.001s" fill="freeze"/></text>
      <text class="typed-char" x="171.6" y="133" opacity="0">l<animate attributeName="opacity" from="0" to="1" begin="1.63s" dur="0.001s" fill="freeze"/></text>
